services:
  - type: web
    name: nemo-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: Prototype/nemo-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
